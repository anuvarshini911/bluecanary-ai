apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service-sanity
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service-sanity
  template:
    metadata:
      labels:
        app: order-service-sanity
    spec:
      containers:
        - name: order-service
          image: order-service:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: order-service-sanity
spec:
  selector:
    app: order-service-sanity
  ports:
    - port: 80
      targetPort: 8000
